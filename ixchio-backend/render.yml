services:
  - type: web
    name: ixchio
    runtime: docker
    region: oregon
    plan: free
    branch: main
    rootDir: ixchio-backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: CEREBRAS_API_KEY
        sync: false
